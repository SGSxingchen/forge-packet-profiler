name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: packetprofiler-forge-1.20.1
          path: build/libs/*.jar

      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version =' build.gradle | sed -E "s/version = ['\"]([^'\"]+)['\"]/\1/")
          TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          TITLE="Forge Packet Profiler ${VERSION} Build ${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" build/libs/*.jar \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes "Automated build from commit $GITHUB_SHA." \
            --latest
